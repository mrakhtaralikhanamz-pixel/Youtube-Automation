name: Daily Short - produce and upload next queued video
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * *"
jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit updated queue state
        run: |
          git config user.name "yt-automation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content_queue content_done || true
          git diff --cached --quiet || git commit -m "chore: mark produced script as done / auto-generated new scripts [skip ci]"
          git push
