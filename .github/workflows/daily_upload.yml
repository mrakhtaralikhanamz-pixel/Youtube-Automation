name: Daily Short - produce and upload next queued video

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * *"

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python main.py

      - name: Commit updated queue state
        run: |
          git config user.name "yt-automation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content_queue content_done
          git diff --cached --quiet || git commit -m "chore: mark produced script as done [skip ci]"
          git push
